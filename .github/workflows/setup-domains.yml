name: Setup Custom Domains

on:
  workflow_dispatch:

jobs:
  setup-domains:
    runs-on: ubuntu-latest
    steps:
      - name: Add baseballab.com
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/baseballab-com/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"baseballab.com"}')
          echo "$RESULT"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d['success'] or 'already' in str(d.get('errors','')) else 1)" || \
          echo "Note: domain may already exist, continuing..."

      - name: Add www.baseballab.com
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/baseballab-com/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"www.baseballab.com"}')
          echo "$RESULT"

      - name: Verify domains
        run: |
          curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/baseballab-com/domains" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data['success']:
              domains = [d['name'] for d in data['result']]
              print('Configured domains:', domains)
          else:
              print('Error:', data['errors'])
          "
