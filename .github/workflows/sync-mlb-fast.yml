name: MLB Fast Sync

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 12:00 JST（昼間ゲーム後）
    - cron: '0 8 * * *'   # 08:00 UTC = 17:00 JST（ナイター開始前）
    - cron: '0 11 * * *'  # 11:00 UTC = 20:00 JST（ナイター途中）
    - cron: '0 14 * * *'  # 14:00 UTC = 23:00 JST（ナイター終了後）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-sync-mlb-fast
  cancel-in-progress: false

jobs:
  sync-mlb-results:
    name: "MLB Results + Standings"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB results (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_results.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 20
          done

      - name: Fetch MLB standings (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_standings.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 20
          done

      - name: Commit MLB results + standings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/results.json data/mlb/standings.json
          if git diff --cached --quiet; then
            echo "No MLB changes — skipping commit."
          else
            git commit -m "data: MLB fast sync $(date -u '+%Y-%m-%dT%H:%M')"
            git push
          fi

  sync-mlb-japanese:
    name: "MLB Japanese Players"
    needs: sync-mlb-results
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Japanese player stats (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_japanese.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 20
          done

      - name: Commit Japanese player data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/japanese.json
          if git diff --cached --quiet; then
            echo "No Japanese player changes — skipping commit."
          else
            git commit -m "data: MLB Japanese players sync $(date -u '+%Y-%m-%dT%H:%M')"
            git push
          fi
