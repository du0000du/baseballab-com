name: Daily Data Sync

on:
  schedule:
    - cron: '0 20 * * *'   # 毎日 20:00 UTC = 05:00 JST
  workflow_dispatch:         # 手動実行も可能

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB players and teams
        run: python3 scripts/fetch_mlb.py --mode all

      - name: Check generated files
        run: |
          echo "=== Players ==="
          ls -la data/mlb/players/ | head -5
          echo "Player count: $(ls data/mlb/players/*.json 2>/dev/null | wc -l)"
          echo "=== Teams ==="
          ls -la data/mlb/teams/ | head -5
          echo "Team count: $(ls data/mlb/teams/*.json 2>/dev/null | wc -l)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mlb/
          git diff --staged --quiet || git commit -m "data: daily sync $(date +%Y-%m-%d)"
          git push
