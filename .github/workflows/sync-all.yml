name: Data Sync All

on:
  schedule:
    - cron: '0 1 * * *'    # 01:00 UTC = 10:00 JST（NPB更新直後）
    - cron: '0 16 * * *'   # 16:00 UTC = 01:00 JST（MLB夜間更新）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-sync-all
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  sync-npb:
    name: "NPB Data Sync"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pykakasi --quiet

      - name: Fetch NPB stats (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_npb.py --mode all && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit NPB data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/npb/
          if git diff --cached --quiet; then
            echo "No NPB changes — skipping commit."
          else
            git commit -m "data: NPB sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  sync-npb-results:
    name: "NPB Game Results"
    needs: sync-npb
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch NPB results (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_npb_results.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit NPB results data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/npb/results.json data/npb/standings.json
          if git diff --cached --quiet; then
            echo "No NPB results changes -- skipping commit."
          else
            git commit -m "data: NPB results sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  sync-mlb-players:
    name: "MLB Players & Teams"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB players & teams (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb.py --mode all && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit MLB player/team data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/players/ data/mlb/teams/
          if git diff --cached --quiet; then
            echo "No MLB player/team changes — skipping commit."
          else
            git commit -m "data: MLB players sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  sync-mlb-leaders:
    name: "MLB Leaders"
    needs: sync-mlb-players
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB leaders (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_leaders.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit MLB leaders data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/leaders/
          if git diff --cached --quiet; then
            echo "No MLB leaders changes — skipping commit."
          else
            git commit -m "data: MLB leaders sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  sync-mlb-standings:
    name: "MLB Standings & Pythagorean"
    needs: sync-mlb-leaders
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB standings (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_standings.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit MLB standings data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/standings.json
          if git diff --cached --quiet; then
            echo "No standings changes -- skipping commit."
          else
            git commit -m "data: MLB standings sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  sync-mlb-results:
    name: "MLB Game Results"
    needs: sync-mlb-standings
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB results (retry x3)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_mlb_results.py && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Commit MLB results data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/mlb/results.json
          if git diff --cached --quiet; then
            echo "No MLB results changes -- skipping commit."
          else
            git commit -m "data: MLB results sync $(date -u '+%Y-%m-%d')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: "Validate Data"
    needs: [sync-npb-results, sync-mlb-results]
    runs-on: ubuntu-latest
    if: always()   # even if earlier jobs skipped (no changes)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest committed data
        run: git pull --rebase origin main

      - name: Run data validation
        run: python3 scripts/validate_data.py
