name: Fetch MLB Team Data

on:
  workflow_dispatch:

jobs:
  fetch-teams:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB team data
        run: python3 scripts/fetch_mlb.py --mode teams

      - name: Check generated files
        run: |
          echo "=== Generated files ==="
          ls -la data/mlb/teams/ || echo "No files generated"
          echo "File count: $(ls data/mlb/teams/*.json 2>/dev/null | wc -l)"

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mlb/teams/
          git diff --staged --quiet || git commit -m "data: fetch MLB team JSONs ($(date +%Y-%m-%d))"
          git push
