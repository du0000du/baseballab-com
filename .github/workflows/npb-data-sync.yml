name: NPB Daily Data Sync

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 01:00 UTC = 10:00 JST（NPB.jp更新後）
    - cron: '0 2 * * *'   # 毎日 02:00 UTC = 11:00 JST（フォールバック）
  workflow_dispatch:        # 手動実行可

permissions:
  contents: write

concurrency:
  group: npb-data-sync
  cancel-in-progress: false  # 先行ジョブ完了後に後続が走る（二重コミット防止）

jobs:
  sync-npb:
    runs-on: ubuntu-latest
    timeout-minutes: 20     # ハング防止

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pykakasi --quiet

      - name: Fetch NPB official stats (retry up to 3 times)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python3 scripts/fetch_npb.py --mode all && break
            echo "Attempt $i failed."
            [ $i -lt 3 ] && sleep 30
          done

      - name: Check generated files
        run: |
          echo "=== players ==="
          ls data/npb/players/*.json 2>/dev/null | wc -l
          echo "=== meta ==="
          cat data/npb/meta.json 2>/dev/null || echo "no meta"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/npb/
          if git diff --cached --quiet; then
            echo "No NPB data changes. Skipping commit."
          else
            git commit -m "data: NPB daily sync $(date -u '+%Y-%m-%d')"
            git push
            echo "Committed and pushed -> Cloudflare Pages redeploy triggered"
          fi
