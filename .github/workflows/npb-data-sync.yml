name: NPB Daily Data Sync

on:
  schedule:
    - cron: '40 16 * * *'   # 毎日 16:40 UTC = 01:40 JST
  workflow_dispatch:          # 手動実行可

permissions:
  contents: write

concurrency:
  group: npb-data-sync
  cancel-in-progress: false

jobs:
  sync-npb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pykakasi

      - name: Fetch NPB official stats
        run: python3 scripts/fetch_npb.py --mode all

      - name: Check generated files
        run: |
          echo "=== players ==="
          ls data/npb/players/*.json 2>/dev/null | wc -l
          echo "=== meta ==="
          cat data/npb/meta.json 2>/dev/null || echo "no meta"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/npb/
          if git diff --cached --quiet; then
            echo "No NPB data changes. Skipping commit."
          else
            git commit -m "data: NPB daily sync $(date -u '+%Y-%m-%d')"
            git push
            echo "Committed and pushed -> Cloudflare Pages redeploy triggered"
          fi
