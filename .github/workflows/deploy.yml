name: Deploy to Cloudflare Pages

# 直接 push（人間・Claude の変更）に加えて、Data Sync ワークフローの完了でも起動する。
# 理由: sync.yml は GITHUB_TOKEN で push するため、既定では on:push を発火させない
# (GitHub Actions の再帰トリガー防止仕様)。これにより毎日4回のデータ更新が
# コミットはされてもデプロイされず、本番が最大1日以上遅れる状態になっていた。
on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Data Sync"]
    types: [completed]

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Create Cloudflare Pages project (if not exists)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create baseballab-com --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=main を明示: checkout は detached HEAD になるため、
          # 分岐名の自動検出に委ねると Production ではなく Preview 扱いに
          # なることがあり、その場合カスタムドメイン(baseballab.com)には
          # 反映されない(Actions ジョブ自体は成功と出るため気づきにくい)。
          command: pages deploy ./dist --project-name=baseballab-com --branch=main --commit-dirty=true
