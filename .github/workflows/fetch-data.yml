name: Fetch MLB Data

on:
  workflow_dispatch:        # sync-all.yml に統合済み。手動実行用のみ残す
    # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  fetch-mlb-leaders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB leaders data
        run: python scripts/fetch_mlb_leaders.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mlb/leaders/
          if git diff --cached --quiet; then
            echo "No data changes. Skipping commit."
          else
            git commit -m "data: auto-update MLB 2026 leaders [$(date -u '+%Y-%m-%d')]"
            git push
            echo "Committed and pushed -> Cloudflare Pages redeploy triggered"
          fi
